{% extends 'navbar.html' %}

{% load static %}

{% block content %}
<style>
    body {
        background-color: #f5f7fa;
    }

    .country-card {
        border-radius: 18px;
        overflow: hidden;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        transition: all 0.4s ease;
    }

    .country-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 45px rgba(0,0,0,0.15);
    }

    .country-img {
        height: 220px;
        object-fit: cover;
    }

    .btn-view {
        background-color: #0b1c3f;
        color: #ffffff;
        border-radius: 30px;
        padding: 8px 22px;
        transition: 0.3s ease;
    }

    .btn-view:hover {
        background-color: #142f6f;
        color: #fff;
    }

    .fade-up {
        animation: fadeUp 0.8s ease forwards;
    }

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<div class="container py-5">
    <h2 class="text-center mb-5" style="color:#0b1c3f;">Explore Destinations</h2>

    <div class="row g-4">
        {% for country in countries %}
        <div class="col-md-4 fade-up">
            <div class="country-card">
                {% if country.cover_image %}
                <img src="{{ country.cover_image }}" class="w-100 country-img">
                {% endif %}

                <div class="p-4 text-center">
                    <h4 class="mb-3" style="color:#0b1c3f;">{{ country.name }}</h4>
                    <a href="{% url 'country_places' country.name %}" class="btn btn-view">
                        View All Places
                    </a>
                </div>
            </div>
        </div>
        {% empty %}
        <p class="text-center">No countries available.</p>
        {% endfor %}
    </div>
</div>

{% include 'footer.html' %}
{% endblock %}
