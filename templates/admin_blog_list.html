{% extends 'base_admin.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>All Blogs</h3>
    <a href="{% url 'admin_add_blog' %}" class="btn btn-primary">
        + Add New Blog
    </a>
</div>

<table class="table table-bordered table-hover">
    <thead>
        <tr>
            <th>Title</th>
            <th>Slug</th>
            <th>Date</th>
            <th width="180">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for blog in blogs %}
        <tr>
            <td>{{ blog.title }}</td>
            <td>{{ blog.slug }}</td>
            <td>{{ blog.date }}</td>
            <td>
                <a href="{% url 'admin_update_blog' blog.id %}"
                   class="btn btn-sm btn-warning">
                   Update
                </a>

                <form action="{% url 'admin_delete_blog' blog.id %}"
                      method="POST"
                      style="display:inline;">
                    {% csrf_token %}
                    <button type="submit"
                            class="btn btn-sm btn-danger"
                            onclick="return confirm('Are you sure you want to delete this blog?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="text-center">No blogs found</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
