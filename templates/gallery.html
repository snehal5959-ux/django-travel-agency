{% extends 'navbar.html' %}
{% load static %}

{% block content %}

<div class="container py-5">

    <div class="text-center mb-5">
        <h5 class="section-title px-3">Gallery</h5>
        <h1>Travel Memories</h1>
        <p>Explore beautiful moments from our journeys</p>
    </div>

    <div class="row g-4">

        {% for image in images %}
        <div class="col-lg-4 col-md-6">

            <div class="gallery-card">

                <div class="gallery-img">
                    <img src="{{ image.image }}" alt="{{ image.title }}">
                </div>

                <div class="gallery-content">
                    <h5>{{ image.title }}</h5>
                    <p>{{ image.description|truncatewords:15 }}</p>
                </div>

            </div>

        </div>
        {% empty %}
        <p class="text-center">No images in gallery yet.</p>
        {% endfor %}

    </div>

</div>

<style>

.gallery-card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:0.3s;
    height:100%;
}

.gallery-card:hover{
    transform:translateY(-5px);
}

.gallery-img img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.gallery-content{
    padding:20px;
}

.gallery-content h5{
    font-weight:600;
}

.gallery-content p{
    font-size:14px;
    color:#666;
}

</style>

{% endblock %}
