{% extends "base_admin.html" %}
{% block content %}

<h4>Reply to {{ contact_msg.name }}</h4>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label>User</label>
        <input type="text" class="form-control"
               value="{{ user.username|default:contact_msg.email }}" readonly>
    </div>

    <div class="mb-3">
        <label>Subject</label>
        <input type="text" name="subject" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Message</label>
        <textarea name="message" class="form-control" rows="5" required></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Send Message</button>
</form>

{% endblock %}
