<!DOCTYPE html>
<html>
<head>
    <title>Payment Successful</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }
        .container {
            width: 500px;
            margin: 50px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #28a745;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
        }
        input, button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        input[readonly] {
            background-color: #e9ecef;
        }
        button {
            background-color: #28a745;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .success-message {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Payment Successful 🎉</h2>

    <div class="success-message">
        <p>Thank you, <strong>{{ booking.name }}</strong>!</p>
<p>Your booking for <strong>{{ booking.package.name }}</strong> has been confirmed.</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" value="{{ booking.email }}" readonly>
        </div>

        <div class="form-group">
            <label>Amount Paid (TND)</label>
           <input type="text" name="amount_paid" 
       value="{{ booking.total_price }}" 
       readonly>
        </div>

        <div class="form-group">
            <label>Transaction ID</label>
            <input type="text" name="transaction_id" placeholder="Enter Transaction ID" required>
        </div>

        <div class="form-group">
            <label>Payment Screenshot URL</label>
            <input type="url" name="payment_screenshot" placeholder="https://example.com/screenshot.jpg" required>
        </div>

        <button type="submit">Submit Payment Details</button>
        <a class="btn btn-success rounded-pill py-3 px-5"
   href="{% url 'invoice_view' booking.id %}">
   Generate Invoice
</a>
    </form>

</div>

</body>
</html>
